# .github/workflows/ci.yml (reemplaza todos)
name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    name: Build, Test & Security
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build solution
      run: dotnet build --no-restore --configuration Release
    
    - name: Run Domain Unit Tests
      run: dotnet test tests/Domain.UnitTests/Domain.UnitTests.csproj --no-build --configuration Release --verbosity normal
    
    - name: Run Application Unit Tests
      run: dotnet test tests/Application.UnitTests/Application.UnitTests.csproj --no-build --configuration Release --verbosity normal
    
    - name: Run Integration Tests
      run: dotnet test tests/IntegrationTests/IntegrationTests.csproj --no-build --configuration Release --verbosity normal
    
    - name: Security Scan (warnings only)
      run: dotnet list package --vulnerable --include-transitive
      continue-on-error: true
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: '**/TestResults/**/*.trx'
        if-no-files-found: ignore