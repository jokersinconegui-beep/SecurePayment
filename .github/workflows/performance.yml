# .github/workflows/performance.yml
name: Performance Check

on:
  pull_request:
    branches: [ main ]

jobs:
  performance:
    name: Performance Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore packages
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release
    
    # ✅ Si no tienes benchmarks, solo verifica que compile rápido
    - name: Check build time
      run: echo "Build completed successfully"
    
    # Opcional: Descomentar si tienes benchmarks configurados
    # - name: Run Benchmarks
    #   run: dotnet run --project tests/PerformanceTests --configuration Release