# .github/workflows/security-scan.yml
name: Security Scan

on:
  schedule:
    - cron: '0 0 * * 0'  # Cada domingo
  workflow_dispatch:  # Permitir ejecución manual

jobs:
  security:
    name: Security Vulnerabilities Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    # ✅ Restaurar paquetes primero
    - name: Restore packages
      run: dotnet restore
    
    # ✅ Escanear vulnerabilidades (no falla el build, solo reporta)
    - name: Scan for vulnerabilities
      run: |
        dotnet list package --vulnerable --include-transitive > vuln-report.txt
        cat vuln-report.txt
      continue-on-error: true  # No falla el workflow
    
    # ✅ Subir reporte como artefacto
    - name: Upload vulnerability report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: vulnerability-report
        path: vuln-report.txt